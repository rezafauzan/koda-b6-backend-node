name: "Integration Development"
run-name: "Setup Docker Image Environment Build And Run"
on:
    push:
        branches:
            - "main"
        tags:
            - "v.*.*.*-*"
jobs:
    Build-and-Run:
        runs-on: ubuntu-latest
        permissions:
            packages: write
        steps:
            - name: Fetch Source Code
              uses: actions/checkout@v6
            - name: "[DOCKER] Setup metadata"
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/rezafauzan/coffeeshop-server-backend-express
                  tags: type=raw,value=latest
            - name: "[DOCKER] Login GHCR"
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner}}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: "[DOCKER] Set up QEMU"
              uses: docker/setup-qemu-action@v3
            - name: "[DOCKER] Set up Docker Buildx"
              uses: docker/setup-buildx-action@v3
            - name: "[DOCKER] Build and push"
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
            - name: "[SERVER] pull image from ghcr.io"
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.KEY }}
                  port: ${{ secrets.PORT }}
                  script: |
                      cd server-reza-node-backend
                      docker compose pull backend
                      docker compose up backend -d
